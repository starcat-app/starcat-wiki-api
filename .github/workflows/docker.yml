name: Docker

# ===========================================
# 触发条件
# ===========================================
on:
  workflow_run:
    workflows: ["Go"]
    types: [completed]
  workflow_dispatch:  # 手动触发 (Actions 页面), 便于本地测试

# ===========================================
# 任务定义
# ===========================================
jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # workflow_run 在 CI 失败和 PR 场景也会触发；只允许成功的 push 或人工触发推送镜像。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # workflow_run 默认会 checkout 当前 main，必须固定到已通过 CI 的准确提交。
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      # Tag 镜像注入正式版本；分支镜像显式标为开发构建。
      - name: Resolve build version
        id: version
        run: |
          REF_NAME="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # 2. 设置 Docker Buildx (用于多架构构建)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. 登录 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 提取元数据 (镜像名, 标签)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. 构建 (可选推送)
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
