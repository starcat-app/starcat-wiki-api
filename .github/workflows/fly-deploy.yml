# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy

on:
  workflow_run:
    workflows: ["Go"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # 生产部署只能来自成功的 v* tag CI；人工触发保留为显式运维逃生口。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v7
        with:
          # 固定到触发 Go CI 的提交，避免后续 main push 导致部署错位。
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG=$(git describe --tags --exact-match HEAD)
          fi
          printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "production deploy requires an exact vX.Y.Z tag, got: $TAG" >&2
            exit 1
          }
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg VERSION="${{ steps.version.outputs.version }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
