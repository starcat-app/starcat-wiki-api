# fly.toml app configuration file generated for starcat-wiki-api on 2026-06-18T00:23:57+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'starcat-wiki-api'
primary_region = 'nrt'

[build]

[env]
  GOGC = '100'
  GOMAXPROCS = '1'
  PORT = '5004'

[processes]
  app = './server'

[[mounts]]
  source = 'starcat_wiki_data'
  destination = '/data'

[http_service]
  internal_port = 5004
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
